<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select App UI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        a {
            color: white;
            text-decoration: none;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #07122e;
            font-family: Arial, sans-serif;
        }

        .main-card {
            width: 420px;
            background: #f1f5f9;
            padding: 35px;
            border-radius: 28px;
        }

        .main-card h1 {
            text-align: center;
            margin-bottom: 35px;
            color: #0f172a;
            font-weight: bold;
        }

        .app-btn {
            width: 100%;
            padding: 16px;
            margin-bottom: 20px;
            border: none;
            border-radius: 16px;
            background: #2563eb;
            color: white;
            font-size: 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        .app-btn:hover {
            background: #1d4ed8;
            transform: scale(1.02);
        }
    </style>
</head>

<body>

    <div class="main-card text-center">

        <h1>Select App</h1>

        <button class="app-btn"><a href="movie.html">Movie App</a></button>

        <button class="app-btn"><a href="weather.html">Weather App</a></button>

        <button class="app-btn"><a href="texttranslator.html">Translator App</a></button>
        <p>Click movieApp/TranslatorApp/WeatherApp</p>
    </div>


</body>

</html>
