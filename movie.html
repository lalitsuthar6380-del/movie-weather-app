<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Netflix Style App UI</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


</head>

<body id="bg-color2">
   <a class="back-home p-0" href="index.html">
            <h4 class="back-home-text">Back to Home</h4>
        </a>

  <!-- Navbar -->
  <nav class="navbar navbar-dark px-4 py-3">
    <a class="navbar-brand" href="#">NETFLIX UI</a>
  </nav>

  <!-- Search Section -->
  <div class="container">
    <div class="search-box d-flex gap-2">
      <input id="inp" type="text" class="form-control" placeholder="Search Movies...">

    </div>
  </div>

  <!-- Movie Card -->
  <div class="container mt-5">
    <div class="row movie-container g-4">

    </div>
  </div>

</body>
<script>
  const container = document.querySelector(".movie-container")
  const TOP_MOVIES_API = "https://api.themoviedb.org/3/discover/movie?sort_by=popularity.desc&api_key=04c35731a5ee918f014970082a0088b1&page=1"  ; 
  const IMGPATH = "https://image.tmdb.org/t/p/w1280";
  const SEARCHAPI = "https://api.themoviedb.org/3/search/movie?&api_key=04c35731a5ee918f014970082a0088b1&query=";

  async function getMovie(API) {
    const response = await fetch(API);
    const data = await response.json()
    showMovies(data.results)

  }

  getMovie(TOP_MOVIES_API)

  function showMovies(movies) {
    container.innerHTML = "";
    movies.forEach((movie, index) => {
      const { title, poster_path, vote_average, overview, release_date } = movie;
      let thumbnail = IMGPATH + poster_path;

      const div = document.createElement("div");
      div.classList.add("col-md-4");
      div.innerHTML = `<div class="card  movie-card" style="width: 22rem;">
      
      <img 
        src=${thumbnail}
        class="card-img-top movie-img" 
        alt="Movie Poster"
      >

      <div class="card-body">
        <h4 class="card-title">
            ${title}
            </h4>

        <p class="rating">
          ★ ${vote_average} /10
        </p>

        <p class="card-text">
          ${overview}
        </p>

        <button type="button" class="btn btn-danger btn-netflix w-100">Watch Now</button>

          
        
      </div>

    </div>`
      container.append(div)
    })
  }

document.querySelector("#inp").addEventListener("keyup", (event) => {

  if (event.target.value === "") {

  
    getMovie(TOP_MOVIES_API)

  } else {

   
    getMovie(SEARCHAPI + event.target.value)

  }

})

</script>

</html>
