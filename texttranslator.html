<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Translator UI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .translator-card {
            width: 100%;
            max-width: 950px;
            background: #1e293b;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);
        }

        .title {
            color: white;
            font-size: 32px;
            font-weight: bold;
        }

        .title span {
            color: #0d6efd;
        }

        .translator-box {
            background: #334155;
            border-radius: 15px;
            padding: 20px;
            height: 260px;
        }

        textarea {
            width: 100%;
            height: 160px;
            resize: none;
            background: transparent;
            border: none;
            color: white;
            font-size: 18px;
            outline: none;
        }

        textarea::placeholder {
            color: #cbd5e1;
        }

        .lang-select {
            background: #0f172a;
            border: none;
            color: white;
        }

        .bottom-icons i {
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .bottom-icons i:hover {
            color: #0d6efd;
        }

        .translate-btn {
            padding: 14px;
            font-size: 18px;
            border-radius: 12px;
        }

        .back-home {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-left: 30px;
            margin-top: 15px;
            transition: 0.3s;
        }

        .back-home:hover {
            color: #e50914;
        }

        .back-home-text {
            font-size: 15px;
        }

        @media(max-width:768px) {
            .translator-box {
                margin-bottom: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <a class="back-home p-0" href="index.html">
            <h4 class="back-home-text">Back to Home</h4>
        </a>
        <div class="translator-card">

            <!-- Heading -->
            <div class="text-center mb-4">
                <h1 class="title">Text <span>Translator</span></h1>

            </div>

            <!-- Translator Area -->
            <div class="row g-4">

                <!-- Left Box -->
                <div class="col-md-6">
                    <div class="translator-box">

                        <div class="d-flex justify-content-between mb-3">
                            <select id="fromLang" class="form-select lang-select w-50">
                                <option>English</option>
                                <option>Hindi</option>
                                <option>Spanish</option>
                            </select>

                            <button class="btn btn-primary">
                                <i class="bi bi-arrow-left-right"></i>
                            </button>
                        </div>

                        <textarea id="inputText" placeholder="Enter text here..."></textarea>

                        <div class="bottom-icons d-flex justify-content-between mt-3">


                            <span class="text-light">0 / 500</span>
                        </div>

                    </div>
                </div>

                <!-- Right Box -->
                <div class="col-md-6">
                    <div class="translator-box">

                        <div class="d-flex justify-content-between mb-3">
                            <select id="toLang" class="form-select lang-select w-50">
                                <option>Hindi</option>
                                <option>English</option>
                                <option>French</option>
                            </select>
                        </div>

                        <textarea id="outputText" placeholder="Translated text..." readonly></textarea>

                        <div class="bottom-icons d-flex justify-content-end mt-3">

                        </div>

                    </div>
                </div>

            </div>

            <!-- Button -->
            <div class="text-center mt-4">
                <button id="translateBtn" class="btn btn-primary translate-btn w-100">
                    Translate Text
                </button>
            </div>

        </div>
    </div>

</body>
<script>

    let btn = document.querySelector("#translateBtn");

    btn.addEventListener("click", async () => {

        let text = document.querySelector("#inputText").value;

        let fromLang = document.querySelector("#fromLang").value;
        let toLang = document.querySelector("#toLang").value;

        let langCode = {
            English: "en",
            Hindi: "hi",
            Spanish: "es",
            French: "fr"
        };

        const url =
            `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${langCode[fromLang]}&tl=${langCode[toLang]}&dt=t&q=${encodeURIComponent(text)}`;


        const response = await fetch(url);


        const data = await response.json();


        document.querySelector("#outputText").value = data[0][0][0];

    });

</script>

</html>
