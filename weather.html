<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Simple Weather UI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: #0f172a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .weather-card {
            width: 350px;
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.2);
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-box input {
            border-radius: 10px;
        }

        .search-btn {
            border: none;
            background: #2563eb;
            color: white;
            width: 50px;
            border-radius: 10px;
        }

        .weather-icon {
            font-size: 70px;
            color: orange;
            margin-top: 20px;
        }

        .temp {
            font-size: 50px;
            font-weight: bold;
        }

        .city {
            font-size: 28px;
            font-weight: bold;
        }

        .condition {
            color: gray;
            margin-bottom: 20px;
        }

        .details {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .box {
            background: #f1f5f9;
            width: 48%;
            padding: 15px;
            border-radius: 15px;
        }

        .box i {
            font-size: 25px;
            color: #2563eb;
        }

        .value {
            font-size: 20px;
            font-weight: bold;
        }

        .back-home {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-left: 30px;
            margin-top: 15px;
            transition: 0.3s;
        }

        .back-home:hover {
            color: #e50914;
        }

        .back-home-text {
            font-size: 15px;

        }

        .back {
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>

<body>
    <div class="back">
        <a class="back-home" href="index.html">
            <h4 class="back-home-text">Back to Home</h4>
        </a>
    </div>

    <div class="weather-card">

        <!-- Search -->
        <form class="search-box">

            <input type="text" class="form-control" placeholder="Search city" name="cityName">

            <button class="search-btn">
                <i class="bi bi-search"></i>
            </button>

        </form>

        <!-- Weather Details -->
        <div class="weather-icon">
            <i class="bi bi-cloud-sun-fill"></i>
        </div>

        <div class="mainRes" id="response">

        </div>


        <div class="condition">
            Cloudy Weather
        </div>

        <!-- Bottom Details -->
        <div class="details">

            <div class="box">

                <i class="bi bi-droplet-half"></i>

                <div class="value humidity">

                </div>

                <small>Humidity</small>

            </div>

            <div class="box">

                <i class="bi bi-wind"></i>


                <div class="value wind">

                </div>

                <small>Wind</small>

            </div>

        </div>

    </div>

</body>

<script>

    const APIKey = '9e1ac06a6f72dc48dc80d70b4f040583';

    let response = document.querySelector("#response")
    response.style.display = "none";


    let form = document.querySelector(".search-box");

    form.addEventListener("submit", async (event) => {

        let cityName = event.target.cityName.value;


        event.preventDefault();


        let weatherAPI =
            `https://api.openweathermap.org/data/2.5/weather?q=${cityName}&units=metric&appid=${APIKey}`;

        let fetchData = await fetch(weatherAPI);
        let finalRes = await fetchData.json();

        console.log(finalRes)
        response.style.display = "block";
        response.innerHTML = `  <h4 class="temp">
               ${finalRes.main.temp}
            </h4>

            <h1 class="city">
                ${finalRes.name}
            </h1>`

        document.querySelector(".condition").innerHTML =
            finalRes.weather[0].main;

        document.querySelector(".humidity").innerHTML =
            finalRes.main.humidity + "%";

        document.querySelector(".wind").innerHTML =
            finalRes.wind.speed + " km/h";
    })

</script>

</html>
